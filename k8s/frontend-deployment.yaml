apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: lanchonete
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: kalyo/frontend-lanchonete:v1
          ports:
            - containerPort: 80