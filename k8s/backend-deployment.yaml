apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lanchonete
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: kalyo/backend-lanchonete:v3
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: ""
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: lanchonete
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: lanchonete